name: CI

on:
  pull_request:
    branches:
      - master
      - develop
      # Add more branches as necessary

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3  # Updated to v3 for Node.js 22+ compatibility

      - name: Set up Node.js
        uses: actions/setup-node@v3  # Updated to v3 for Node.js 22+ compatibility
        with:
          node-version: "22" # Use the Node.js version specified in your package.json

      - name: Install dependencies
        run: npm install

      - name: Install moment for GitHub Actions
        run: npm install moment # Install moment specifically for the CI environment

      - name: Run Prettier Check
        run: npm run test:prettier

      - name: Run ESLint Check
        run: npm run test:js

      - name: Run Stylelint Check
        run: npm run test:css

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3  # Updated to v3 for Node.js 22+ compatibility

      - name: Set up Node.js
        uses: actions/setup-node@v3  # Updated to v3
        with:
          node-version: "22"  # Or use 24 if you prefer to opt into Node.js 24 now

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Run Tests with Coverage
        run: npm run test:coverage

  # Optional: If you want a separate job for generating coverage reports, you can add it here.
